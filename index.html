<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Колесо фортуны</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg1:#0f0f12; --bg2:#191922; --text:#f4f4f7; --muted:#b7b7c7;
      --accent:#ff4fa3; --accent2:#ffd1e6; --good:#36d399; --bad:#ff6b6b;
      --stroke:rgba(255,255,255,.12);
    }
    html,body{height:100%; margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      background: radial-gradient(1200px 600px at 30% 0%, #2a2030 0%, transparent 60%), linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);}
    .wrap{max-width:460px; margin:0 auto; padding:18px 16px 28px;}
    .card{background:rgba(21,21,28,.82); border:1px solid var(--stroke); border-radius:18px; padding:16px; backdrop-filter: blur(10px);}
    .title{font-size:20px; font-weight:800; margin:0 0 6px;}
    .sub{margin:0 0 12px; color:var(--muted); line-height:1.35}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .pill{display:inline-flex; gap:8px; align-items:center; padding:8px 10px; border-radius:999px; border:1px solid var(--stroke);
      color:var(--muted); font-size:13px}
    .pill b{color:var(--text)}
    .wheelBox{position:relative; display:flex; justify-content:center; align-items:center; margin:14px auto 12px;}
    canvas{width:320px; height:320px; border-radius:50%; box-shadow: 0 18px 50px rgba(0,0,0,.45);}
    .pointer{position:absolute; top:-6px; width:0; height:0;
      border-left:14px solid transparent; border-right:14px solid transparent; border-bottom:26px solid var(--accent);}
    .btn{width:100%; border:0; border-radius:14px; padding:14px; font-size:15px; font-weight:800; cursor:pointer;
      color:#121218; background: linear-gradient(180deg, var(--accent2), var(--accent));}
    .btn:disabled{opacity:.45; cursor:not-allowed;}
    .result{font-size:18px; font-weight:900; margin-top:10px}
    .status{margin-top:6px; color:var(--muted); font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Колесо фортуны к 8 марта</h1>
      <p class="sub">Крутите 1 раз и получите скидку. Повторное участие невозможно.</p>

      <div class="wheelBox">
        <div class="pointer"></div>
        <canvas id="wheel" width="640" height="640"></canvas>
      </div>

      <button class="btn" id="btnSpin">🎡 Крутить</button>
      <div class="result" id="result"></div>
      <div class="status" id="status"></div>
    </div>
  </div>

<script>
(() => {
  const tg = window.Telegram?.WebApp;
  if (!tg) return;

  tg.ready();
  tg.expand();

  const API_BASE = "https://browwheel-api.vladislav9608.workers.dev";
  const API_STATUS = API_BASE + "/api/status";
  const API_SPIN = API_BASE + "/api/spin";

  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const btn = document.getElementById("btnSpin");
  const resultEl = document.getElementById("result");
  const statusEl = document.getElementById("status");

  const wheel = [5,5,5,5,5, 10,10,10,10, 15,15,15, 20,20, 25, 30];
  const labels = wheel.map(x => `-${x}%`);

  let rotation = 0;
  let locked = false;

  function draw(rot=0){
    const cx = canvas.width/2;
    const cy = canvas.height/2;
    const r = cx - 16;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rot);

    const step = 2*Math.PI/labels.length;
    for(let i=0;i<labels.length;i++){
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,r,i*step,(i+1)*step);
      ctx.closePath();
      ctx.fillStyle = i%2 ? "#ff4fa3" : "#ffd1e6";
      ctx.fill();

      ctx.save();
      ctx.rotate(i*step+step/2);
      ctx.textAlign="right";
      ctx.fillStyle="#000";
      ctx.font="bold 36px Arial";
      ctx.fillText(labels[i],r-20,10);
      ctx.restore();
    }
    ctx.restore();
  }

  function pickIndex(discount){
    const arr=[];
    for(let i=0;i<wheel.length;i++)
      if(wheel[i]===discount) arr.push(i);
    return arr[Math.floor(Math.random()*arr.length)];
  }

  function spinTo(index){
    const step = 2*Math.PI/wheel.length;
    const targetAngle = -(index*step + step/2);
    const final = targetAngle - 6*2*Math.PI;
    const start = rotation;
    const delta = final - start;
    const duration = 3500;
    const startTime = performance.now();

    function anim(t){
      const p = Math.min(1,(t-startTime)/duration);
      const eased = 1 - Math.pow(1-p,3);
      rotation = start + delta*eased;
      draw(rotation);
      if(p<1) requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }

  async function check(){
    try{
      const r=await fetch(API_STATUS,{
        method:"POST",
        headers:{'content-type':'application/json'},
        body:JSON.stringify({initData:tg.initData})
      });
      const d=await r.json();
      if(d.ok && d.already){
        locked=true;
        btn.disabled=true;
        resultEl.textContent=`Вы уже участвовали ✅ Ваша скидка: -${d.discount}%`;
      }
    }catch{}
  }

  btn.onclick=async()=>{
    if(locked) return;
    locked=true;
    btn.disabled=true;
    statusEl.textContent="Фиксируем скидку...";

    try{
      const r=await fetch(API_SPIN,{
        method:"POST",
        headers:{'content-type':'application/json'},
        body:JSON.stringify({initData:tg.initData})
      });
      const d=await r.json();

      if(!d.ok){
        locked=false;
        btn.disabled=false;
        statusEl.textContent="Ошибка. Попробуйте снова.";
        return;
      }

      if(d.already){
        resultEl.textContent=`Вы уже участвовали ✅ Ваша скидка: -${d.discount}%`;
        return;
      }

      const index=pickIndex(d.discount);
      spinTo(index);

      setTimeout(()=>{
        resultEl.textContent=`Вам выпала скидка: -${d.discount}%`;
        statusEl.textContent="Сейчас придёт сообщение от бота.";
        setTimeout(()=>tg.close(),900);
      },3600);

    }catch{
      locked=false;
      btn.disabled=false;
      statusEl.textContent="Ошибка связи.";
    }
  };

  draw();
  check();
})();
</script>
</body>
</html>
